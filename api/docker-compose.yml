services:
  db:
    image: postgres:15-alpine
    container_name: finscan_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finscan_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finscan_password}
      POSTGRES_DB: ${POSTGRES_DB:-finscan_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: finscan_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-finscan_user}:${POSTGRES_PASSWORD:-finscan_password}@db:5432/${POSTGRES_DB:-finscan_db}
    volumes:
      - .:/app

  pgadmin:
    image: dpage/pgadmin4
    container_name: finscan_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@finscan.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    depends_on:
      - db

volumes:
  postgres_data: